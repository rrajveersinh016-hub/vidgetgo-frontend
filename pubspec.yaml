name: loophole
description: LoopHole - A clean, fast, minimal dark-themed video downloader app.

publish_to: 'none'
version: 1.0.9+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Firebase
  firebase_core: ^3.10.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.2.0
  firebase_remote_config: ^5.1.0
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Video Processing
  # (Using native Android MediaMuxer via MethodChannel)
  # HTTP Client
  dio: ^5.4.0
  
  # Ads Integration
  google_mobile_ads: ^9.0.0
  
  # Notifications
  

  # Permissions
  permission_handler: ^11.3.0
  
  # Storage
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  youtube_explode_dart: ^3.0.5
  
  # In-App Updates
  in_app_update: ^4.0.0
  url_launcher: ^6.0.0
  in_app_review: ^2.0.12
  package_info_plus: ^8.0.0
  audioplayers: ^6.0.0
  video_player: ^2.8.2
  
  # Animations
  flutter_animate: ^4.5.0

  # Background processing
  # (Removed workmanager to avoid v1 embedding compile errors)

  # Icons and Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/app_icon_clear.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon_clear.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
